version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse_system
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_PASSWORD=123456789
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SETTINGS_MODULE=warehouse.settings
      - PYTHONUNBUFFERED=1
    command:
      - /bin/sh
      - -c
      - |
        python manage.py makemigrations core --noinput
        python manage.py migrate --noinput
        python -c "
        import django
        django.setup()
        from django.contrib.auth import get_user_model
        User = get_user_model()
        if not User.objects.filter(username='admin').exists():
            User.objects.create_superuser('admin', 'admin@example.com', '123456789')
            print('Admin user created.')
        else:
            print('Admin user already exists.')
        "
        python manage.py collectstatic --noinput
        echo '===================================='
        echo '  仓库管理系统启动成功！'
        echo '  访问地址: http://localhost:8000'
        echo '  默认账户: admin / 123456789'
        echo '===================================='
        python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
