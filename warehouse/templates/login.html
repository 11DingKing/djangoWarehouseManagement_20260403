<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 仓库管理系统</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/toast.css">
  <link rel="stylesheet" href="/static/css/form.css">
  <link rel="stylesheet" href="/static/css/button.css">
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
  <!-- 初始加载动画 -->
  <div class="loading-overlay" id="initial-loader">
    <div class="loading-container">
      <div class="loading-tech">
        <div class="loading-tech-inner"></div>
      </div>
      <div class="loading-text">系统加载中...</div>
    </div>
  </div>

  <!-- 登录页面 -->
  <div class="login-page">
    <!-- 科技感背景 -->
    <div class="tech-background">
      <!-- 静态方块（不会移动） -->
      <div class="tech-blocks">
        <div class="tech-block"></div>
        <div class="tech-block"></div>
        <div class="tech-block"></div>
        <div class="tech-block"></div>
        <div class="tech-block"></div>
        <div class="tech-block"></div>
        <div class="tech-block"></div>
        <div class="tech-block"></div>
      </div>
      <!-- 动态光效 -->
      <div class="tech-glow"></div>
      <div class="tech-glow"></div>
    </div>

    <!-- 登录卡片 -->
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">📦</div>
        <h1 class="login-title">仓库管理系统</h1>
        <p class="login-subtitle">Warehouse Management System</p>
      </div>

      <form class="login-form" id="login-form">
        {% csrf_token %}
        
        <div class="form-group">
          <label class="form-label required">用户名</label>
          <input type="text" name="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label class="form-label required">密码</label>
          <input type="password" name="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
        </div>

        <div class="form-group">
          <label class="form-label required">验证码</label>
          <div class="captcha-group">
            <div class="captcha-question" id="captcha-question">? + ? = ?</div>
            <input type="text" name="captcha" class="form-input captcha-input" placeholder="答案" required>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <span>登 录</span>
        </button>
      </form>

      <div class="login-footer">
        <p>© 2026 仓库管理系统 · Alkaid-SOP 3.0</p>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/loading.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/form.js"></script>
  <script src="/static/js/pages/login.js"></script>
</body>
</html>
