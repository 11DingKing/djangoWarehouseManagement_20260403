<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日报表 - 仓库管理系统</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/toast.css">
  <link rel="stylesheet" href="/static/css/button.css">
  <link rel="stylesheet" href="/static/css/form.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/card.css">
  <link rel="stylesheet" href="/static/css/table.css">
  <link rel="stylesheet" href="/static/css/page.css">
</head>
<body>
  <div class="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📦</div>
        <span class="sidebar-logo-text">仓库管理系统</span>
      </div>
      <nav class="sidebar-menu" id="sidebar-menu"></nav>
    </aside>

    <!-- 内容区域 -->
    <div class="content-wrapper">
      <!-- 顶部栏 -->
      <header class="header">
        <div class="header-left">
          <h1 class="header-title">每日报表</h1>
        </div>
        <div class="header-right">
          <div class="user-info">
            <div class="user-avatar">{{ user.username|slice:":1"|upper }}</div>
            <span class="user-name">{{ user.username }}</span>
          </div>
          <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>
      </header>

      <!-- 主内容 -->
      <main class="main-content dashboard-content">
        <!-- 统计卡片 - 置顶 -->
        <div class="dashboard-row">
          <div class="stat-card-inline">
            <div class="stat-inline-icon primary">📦</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-inbound">0</div>
              <div class="stat-inline-label">当日入库</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon success">✅</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-approved">0</div>
              <div class="stat-inline-label">审批通过</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon error">❌</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-rejected">0</div>
              <div class="stat-inline-label">审批驳回</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon warning">⏳</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-pending">0</div>
              <div class="stat-inline-label">待处理</div>
            </div>
          </div>
        </div>

        <!-- 筛选条件 - 独立模块 -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">筛选条件</h3>
          </div>
          <div class="card-body">
            <form id="report-form" class="filter-form">
              <div class="filter-row">
                <div class="filter-item">
                  <label class="form-label">报表日期</label>
                  <input type="date" class="form-input" id="report-date">
                </div>
                <div class="filter-actions">
                  <button type="submit" class="btn btn-primary">📈 生成报表</button>
                </div>
              </div>
            </form>
          </div>
        </div>

        <!-- 报表详情 -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">当日入库明细</h3>
            <span class="card-subtitle" id="result-count">共 0 条记录</span>
          </div>
          <div class="card-body no-padding">
            <table class="table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>货物名称</th>
                  <th>品种</th>
                  <th>数量</th>
                  <th>单位</th>
                  <th>状态</th>
                  <th>操作员</th>
                  <th>创建时间</th>
                </tr>
              </thead>
              <tbody id="report-table">
                <tr><td colspan="8" class="table-empty">请选择日期生成报表</td></tr>
              </tbody>
            </table>
          </div>
          <!-- 分页 -->
          <div class="table-pagination" id="pagination-container">
            <div class="pagination-info" id="pagination-info">第 1 页，共 1 页</div>
            <div class="pagination-buttons" id="pagination-buttons"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/loading.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/pagination.js"></script>
  <script>Sidebar.init('{{ current_page }}');</script>
  <script src="/static/js/pages/daily_report.js"></script>
</body>
</html>
