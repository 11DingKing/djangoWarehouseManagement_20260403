<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仓库管理系统</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/toast.css">
  <link rel="stylesheet" href="/static/css/button.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/card.css">
  <link rel="stylesheet" href="/static/css/table.css">
  <link rel="stylesheet" href="/static/css/page.css">
</head>
<body>
  <div class="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📦</div>
        <span class="sidebar-logo-text">仓库管理系统</span>
      </div>
      <nav class="sidebar-menu" id="sidebar-menu"></nav>
    </aside>

    <!-- 内容区域 -->
    <div class="content-wrapper">
      <!-- 顶部栏 -->
      <header class="header">
        <div class="header-left">
          <h1 class="header-title">仪表盘</h1>
        </div>
        <div class="header-right">
          <div class="user-info">
            <div class="user-avatar">{{ user.username|slice:":1"|upper }}</div>
            <span class="user-name">{{ user.username }}</span>
          </div>
          <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>
      </header>

      <!-- 主内容 -->
      <main class="main-content dashboard-content">
        <!-- 图表区域 - 置顶 -->
        <div class="dashboard-row">
          <div class="card flex-1">
            <div class="card-header">
              <h3 class="card-title">近7日入库趋势</h3>
            </div>
            <div class="card-body">
              <div class="chart-container">
                <div class="simple-chart">
                  <div class="chart-bars" id="chart-bars"></div>
                  <div class="chart-labels" id="chart-labels"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="card flex-1">
            <div class="card-header">
              <h3 class="card-title">货物状态分布</h3>
            </div>
            <div class="card-body">
              <div class="status-distribution">
                <div class="status-item">
                  <div class="status-bar">
                    <div class="status-bar-fill pending" id="bar-pending"></div>
                  </div>
                  <div class="status-info">
                    <span class="status-label">待审批</span>
                    <span class="status-count" id="dist-pending">0</span>
                  </div>
                </div>
                <div class="status-item">
                  <div class="status-bar">
                    <div class="status-bar-fill approved" id="bar-approved"></div>
                  </div>
                  <div class="status-info">
                    <span class="status-label">已通过</span>
                    <span class="status-count" id="dist-approved">0</span>
                  </div>
                </div>
                <div class="status-item">
                  <div class="status-bar">
                    <div class="status-bar-fill rejected" id="bar-rejected"></div>
                  </div>
                  <div class="status-info">
                    <span class="status-label">已驳回</span>
                    <span class="status-count" id="dist-rejected">0</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 统计卡片 - 两行布局，每行4个 -->
        <div class="stats-grid">
          <!-- 第一行 -->
          <div class="stat-card-inline">
            <div class="stat-inline-icon primary">📦</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-total">0</div>
              <div class="stat-inline-label">货物总数</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon warning">⏳</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-pending">0</div>
              <div class="stat-inline-label">待审批</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon success">✅</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-approved">0</div>
              <div class="stat-inline-label">已入库</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon info">👥</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-staff">0</div>
              <div class="stat-inline-label">人员总数</div>
            </div>
          </div>
          <!-- 第二行 -->
          <div class="stat-card-inline">
            <div class="stat-inline-icon accent">📅</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-today">0</div>
              <div class="stat-inline-label">今日入库</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon secondary">📁</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-categories">0</div>
              <div class="stat-inline-label">品类</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon secondary">🏷️</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-varieties">0</div>
              <div class="stat-inline-label">品种</div>
            </div>
          </div>
          <div class="stat-card-inline">
            <div class="stat-inline-icon secondary">📐</div>
            <div class="stat-inline-content">
              <div class="stat-inline-value" id="stat-units">0</div>
              <div class="stat-inline-label">单位</div>
            </div>
          </div>
        </div>

        <!-- 最近记录 -->
        <div class="dashboard-row">
          <div class="card flex-1">
            <div class="card-header">
              <h3 class="card-title">最近入库</h3>
              <a href="/goods/inbound/" class="card-link">查看全部 →</a>
            </div>
            <div class="card-body no-padding">
              <table class="table compact">
                <thead>
                  <tr>
                    <th>货物名称</th>
                    <th>品种</th>
                    <th>数量</th>
                    <th>状态</th>
                  </tr>
                </thead>
                <tbody id="recent-goods">
                  <tr><td colspan="4" class="table-empty">暂无数据</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="card flex-1">
            <div class="card-header">
              <h3 class="card-title">最近审批</h3>
              <a href="/approval/" class="card-link">查看全部 →</a>
            </div>
            <div class="card-body no-padding">
              <table class="table compact">
                <thead>
                  <tr>
                    <th>货物名称</th>
                    <th>审批人</th>
                    <th>结果</th>
                    <th>时间</th>
                  </tr>
                </thead>
                <tbody id="recent-approvals">
                  <tr><td colspan="4" class="table-empty">暂无数据</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/loading.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script>Sidebar.init('{{ current_page }}');</script>
  <script src="/static/js/pages/dashboard.js"></script>
</body>
</html>
