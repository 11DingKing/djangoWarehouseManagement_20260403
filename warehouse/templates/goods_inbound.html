<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>货物入库 - 仓库管理系统</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/toast.css">
  <link rel="stylesheet" href="/static/css/button.css">
  <link rel="stylesheet" href="/static/css/form.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/card.css">
  <link rel="stylesheet" href="/static/css/table.css">
  <link rel="stylesheet" href="/static/css/page.css">
</head>
<body>
  <div class="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📦</div>
        <span class="sidebar-logo-text">仓库管理系统</span>
      </div>
      <nav class="sidebar-menu" id="sidebar-menu"></nav>
    </aside>

    <!-- 内容区域 -->
    <div class="content-wrapper">
      <!-- 顶部栏 -->
      <header class="header">
        <div class="header-left">
          <h1 class="header-title">货物入库</h1>
        </div>
        <div class="header-right">
          <div class="user-info">
            <div class="user-avatar">{{ user.username|slice:":1"|upper }}</div>
            <span class="user-name">{{ user.username }}</span>
          </div>
          <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>
      </header>

      <!-- 主内容 -->
      <main class="main-content">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">新建入库单</h3>
          </div>
          <div class="card-body">
            <form id="inbound-form">
              {% csrf_token %}
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label required">货物名称</label>
                  <input type="text" name="name" class="form-input" placeholder="请输入货物名称" required>
                </div>
                <div class="form-group">
                  <label class="form-label required">入库日期</label>
                  <input type="date" name="inbound_date" class="form-input" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label required">品类</label>
                  <select name="category_id" class="form-select" id="category-select" required>
                    <option value="">请选择品类</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label required">品种</label>
                  <select name="variety_id" class="form-select" id="variety-select" required>
                    <option value="">请先选择品类</option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label required">数量</label>
                  <input type="number" name="quantity" class="form-input" placeholder="请输入数量" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                  <label class="form-label required">单位</label>
                  <select name="unit_id" class="form-select" id="unit-select" required>
                    <option value="">请选择单位</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">备注</label>
                <textarea name="remark" class="form-textarea" placeholder="请输入备注信息（选填）"></textarea>
              </div>

              <div class="form-group form-actions">
                <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                  <span>提交入库</span>
                </button>
                <button type="reset" class="btn btn-secondary btn-lg">
                  <span>重置</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/loading.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/form.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script>Sidebar.init('{{ current_page }}');</script>
  <script src="/static/js/pages/goods_inbound.js"></script>
</body>
</html>
