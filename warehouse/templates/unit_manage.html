<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单位管理 - 仓库管理系统</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/loading.css">
  <link rel="stylesheet" href="/static/css/toast.css">
  <link rel="stylesheet" href="/static/css/button.css">
  <link rel="stylesheet" href="/static/css/form.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/card.css">
  <link rel="stylesheet" href="/static/css/table.css">
  <link rel="stylesheet" href="/static/css/modal.css">
  <link rel="stylesheet" href="/static/css/page.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📦</div>
        <span class="sidebar-logo-text">仓库管理系统</span>
      </div>
      <nav class="sidebar-menu" id="sidebar-menu"></nav>
    </aside>

    <div class="content-wrapper">
      <header class="header">
        <div class="header-left">
          <h1 class="header-title">单位管理</h1>
        </div>
        <div class="header-right">
          <div class="user-info">
            <div class="user-avatar">{{ user.username|slice:":1"|upper }}</div>
            <span class="user-name">{{ user.username }}</span>
          </div>
          <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>
      </header>

      <main class="main-content">
        <div class="table-container">
          <div class="table-toolbar">
            <div class="table-toolbar-left">
              <span class="text-secondary">共 <span id="total-count">0</span> 个单位</span>
            </div>
            <div class="table-toolbar-right">
              <button class="btn btn-primary" id="add-btn">+ 新增单位</button>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>单位名称</th>
                  <th>创建时间</th>
                  <th class="text-center">操作</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td colspan="4" class="table-empty">
                    <div class="table-empty-icon">📋</div>
                    <div class="table-empty-text">暂无数据</div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- 分页 -->
          <div class="table-pagination" id="pagination-container">
            <div class="pagination-info" id="pagination-info">第 1 页，共 1 页</div>
            <div class="pagination-buttons" id="pagination-buttons"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/loading.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/form.js"></script>
  <script src="/static/js/modal.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/pagination.js"></script>
  <script>Sidebar.init('{{ current_page }}');</script>
  <script src="/static/js/pages/unit_manage.js"></script>
</body>
</html>
